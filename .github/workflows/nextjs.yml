name: Build Next (static) -> deploy branch

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build (generates /out)
        run: npm run build

      - name: Publish /out to deploy branch
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: deploy
          folder: out
          single-commit: true
